        <h1>Contact Us</h1>
    <section id="contactInfo">
        <ul>
            <li><b>call us:</b><a href="tel: +49 (0) 30 123 456"> +49 (0) 30 123 456</a></li>
            <li><b>write us:</b><a href="mailto:contact@brewedawakening.de">contact@brewedawakening.de</a></li>
            <li><b>visit us:</b> Bauerstraße 15, 12345 Berlin</li>
        </ul>
    </section>
    <figure>
        <img src="https://images.pexels.com/photos/29472455/pexels-photo-29472455.jpeg" width="300px" alt="Three coffee mugs by ufuk iseloglu">
    <figcaption><small>© ufuk iselogl</small></figcaption>
    </figure>
    <section id="contactForm">
        <form>
            <fieldset>
                <legend>Write us a Message</legend><br>
                <label for="fullName">Full Name:<input type="text" name="fullName" id="fullName" placeholder="Add your name.."></label><br>
                <p></p>
                <label for="email">Email:<input type="email" name="email" id="email" placeholder="Add your email.."></label><br>
                <p></p>
                 <label for="message">Message:</label><textarea name="message" id="message"></textarea><br>
                <p></p>
                <button type="submit">send</button>
            </fieldset>
        </form>
    </section>
    </main>
